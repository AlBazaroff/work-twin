services:
  perceiver_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perciever_service
    image: perceiver_work_twin:latest
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "80",
              "--reload"]
    restart: always
    ports: 
      - "80:80"
    env_file: .env
    working_dir: /app/perceiver_service/src
    volumes:
      - ./perceiver_service/src:/app/perceiver_service/src
      - logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
      POSTGRES_DB: ${DATABASE__NAME}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ__USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ__PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  celery_worker:
    image: perceiver_work_twin:latest
    working_dir: /app/perceiver_service/src
    volumes:
      - ./perceiver_service/src:/app/perceiver_service/src
    command: ["celery", "-A", "core", "worker", "-l", "info",
              "-Q", "ingestion_high"]
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  celery_flower:
    image: perceiver_work_twin:latest
    working_dir: /app/perceiver_service/src
    command: ['celery', '-A', 'core', 'flower', '--port=5555']
    volumes:
      - ./perceiver_service/src:/app/perceiver_service/src
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin:
  logs:
  rabbitmq_data:
